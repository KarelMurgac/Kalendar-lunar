{% extends "base.html" %}
{% block title %}Kalendář eventů – Lunar Legion{% endblock %}

{% block head %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<style>
  /* Custom dot-style events like in the reference image */
  .fc-daygrid-event {
    background: transparent !important;
    border: none !important;
    padding: 0 !important;
    margin: 1px 0 !important;
  }
  .fc-event-main {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 1px 4px;
  }
  .event-dot-inline {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    display: inline-block;
  }
  .event-time-inline {
    color: #aaccff;
    font-size: .7rem;
    font-weight: 600;
    flex-shrink: 0;
  }
  .event-title-inline {
    font-size: .72rem;
    font-weight: 500;
    color: #e8f0ff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  /* Day number style */
  .fc .fc-daygrid-day-number {
    font-weight: 700;
    font-size: .95rem;
    color: #fff;
    padding: 6px 8px 2px;
  }
</style>
{% endblock %}

{% block content %}
<section class="calendar-page">
  <div class="category-legend">
    {% for cat in categories %}
      <label class="legend-item">
        <input type="checkbox" class="cat-toggle" data-cat="{{ cat.name }}" checked>
        <span class="legend-dot" style="background:{{ cat.color }}"></span>
        {{ cat.name }}
      </label>
    {% endfor %}
  </div>

  <div id="calendar"></div>
</section>

<!-- Event Detail Modal -->
<div id="event-modal" class="modal hidden">
  <div class="modal-backdrop"></div>
  <div class="modal-box">
    <button class="modal-close">&times;</button>
    <div class="modal-cat-bar" id="modal-cat-bar"></div>
    <h2 id="modal-title"></h2>
    <div class="modal-meta">
      <span id="modal-time"></span>
      <span id="modal-location"></span>
    </div>
    <div class="modal-body">
      <p id="modal-desc"></p>
      <span id="modal-recurring" class="badge badge--recurring hidden">🔁 Opakující se event</span>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const calEl = document.getElementById('calendar');
  let hiddenCats = new Set();

  const calendar = new FullCalendar.Calendar(calEl, {
    initialView: 'dayGridMonth',
    locale: 'cs',
    height: 'auto',
    headerToolbar: {
      left: 'prev,next today',
      center: 'title',
      right: 'dayGridMonth,timeGridWeek,listMonth'
    },
    dayMaxEvents: 6,
    eventContent: function(arg) {
      // Render events with dot + time + title like the reference
      const color = arg.event.backgroundColor || '#4488ff';
      const time = arg.event.start
        ? arg.event.start.toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' })
        : '';
      const el = document.createElement('div');
      el.style.cssText = 'display:flex;align-items:center;gap:4px;padding:1px 3px;width:100%;overflow:hidden';
      el.innerHTML = `
        <span style="width:7px;height:7px;border-radius:50%;background:${color};flex-shrink:0;display:inline-block"></span>
        <span style="color:#aaccff;font-size:.68rem;font-weight:700;flex-shrink:0">${time}</span>
        <span style="font-size:.71rem;color:#e8f0ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${arg.event.title}</span>
      `;
      return { domNodes: [el] };
    },
    events: function(info, success, failure) {
      fetch(`/api/events?start=${info.startStr}&end=${info.endStr}`)
        .then(r => r.json())
        .then(data => {
          const filtered = data.filter(e => !hiddenCats.has(e.extendedProps?.category));
          success(filtered);
        })
        .catch(failure);
    },
    eventClick: function(info) {
      const e = info.event;
      const p = e.extendedProps;
      document.getElementById('modal-title').textContent = e.title;
      document.getElementById('modal-cat-bar').style.background = e.backgroundColor;
      document.getElementById('modal-cat-bar').textContent = p.category || '';

      const start = e.start ? e.start.toLocaleString('cs-CZ', { dateStyle:'medium', timeStyle:'short' }) : '';
      const end = e.end ? ' – ' + e.end.toLocaleString('cs-CZ', { dateStyle:'medium', timeStyle:'short' }) : '';
      document.getElementById('modal-time').textContent = '🕐 ' + start + end;

      const locEl = document.getElementById('modal-location');
      locEl.textContent = p.location ? '📍 ' + p.location : '';

      document.getElementById('modal-desc').textContent = p.description || '';

      const recurEl = document.getElementById('modal-recurring');
      (p.isRecurring || p.isRecurringInstance)
        ? recurEl.classList.remove('hidden')
        : recurEl.classList.add('hidden');

      document.getElementById('event-modal').classList.remove('hidden');
    },
  });

  calendar.render();

  document.querySelectorAll('.cat-toggle').forEach(cb => {
    cb.addEventListener('change', function() {
      if (!this.checked) hiddenCats.add(this.dataset.cat);
      else hiddenCats.delete(this.dataset.cat);
      calendar.refetchEvents();
    });
  });

  document.querySelector('.modal-close').addEventListener('click', closeModal);
  document.querySelector('.modal-backdrop').addEventListener('click', closeModal);
  function closeModal() {
    document.getElementById('event-modal').classList.add('hidden');
  }
});
</script>
{% endblock %}
